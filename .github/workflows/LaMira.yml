name: La Mira

on:
  push:
    branches:
      - main
      - 19-workflows
  pull_request:
    branches:
      - main
      - 19-workflows

env:
  MIRROR_SSH_TARGET: git@github.com:Project-Tranquility/Tranquillity.git

jobs:
  check_work:
    runs-on: ubuntu-latest
    name: check_work
    container:
      image: python:3.14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: install depedencie
        run: pip install -r requirement.txt
  mira:
    runs-on: ubuntu-latest
    needs: check_work
    if: github.repository != 'Project-Tranquility/Tranquillity' && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.check_work.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pixta-dev/repository-mirroring-action@v1
        with:
          target_repo_url:
            ${{ env.MIRROR_SSH_TARGET }}
          ssh_private_key:
            ${{ secrets.SSH_PRIVATE }}