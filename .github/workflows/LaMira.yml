name: La Mira

on:
  push:
    branches:
      - main
      - 19-workflows
  pull_request:
    branches:
      - main
      - 19-workflows

jobs:
  check_work:
    runs-on: ubuntu-latest
    name: check_work
    container:
      image: python:3.14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: install depedencie
        run: pip install -r requirement.txt